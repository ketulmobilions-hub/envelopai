name: envelope
description: Zero-based budgeting app
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1

  # Navigation
  go_router: ^17.1.0

  # Local database
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.30

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Supabase
  supabase_flutter: ^2.9.0

  # AI
  google_generative_ai: ^0.4.7

  # UI / Charts
  fl_chart: ^0.70.2

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4

dev_dependencies:
  bloc_lint: ^0.3.7
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.22
  build_runner: ^2.4.15
  drift_dev: ^2.23.1
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.7.0
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
